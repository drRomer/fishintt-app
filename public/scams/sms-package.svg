<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Background -->
  <rect width="400" height="320" fill="#F5F5F7"/>

  <!-- Phone frame -->
  <rect x="120" y="20" width="160" height="280" rx="24" fill="#1A1A1A"/>
  <rect x="128" y="28" width="144" height="264" rx="18" fill="white"/>

  <!-- Phone notch -->
  <rect x="174" y="32" width="52" height="14" rx="7" fill="#1A1A1A"/>

  <!-- Status bar -->
  <text x="140" y="64" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#1A1A1A">9:41</text>

  <!-- Messages header -->
  <text x="200" y="84" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">Mensajes</text>
  <line x1="128" y1="92" x2="272" y2="92" stroke="#E5E5EA"/>

  <!-- Sender -->
  <circle cx="200" cy="108" r="14" fill="#D97706"/>
  <text x="200" y="113" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">📦</text>
  <text x="200" y="134" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#1A1A1A" text-anchor="middle">+56 9 8731 2904</text>

  <!-- Package emoji header -->
  <rect x="135" y="150" width="130" height="120" rx="12" fill="#FFF3E0"/>
  <text x="142" y="166" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" fill="#D97706">CORREOS DE CHILE</text>
  <text x="142" y="178" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">Tu paquete esta retenido</text>
  <text x="142" y="189" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">en aduana.</text>
  <text x="142" y="204" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">Pago pendiente:</text>
  <text x="142" y="218" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#D42B2B">$3.490 CLP</text>
  <text x="142" y="234" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">Liberar antes 48hrs:</text>
  <text x="142" y="250" font-family="Arial, sans-serif" font-size="7.5" font-weight="600" fill="#0066CC" text-decoration="underline">bit.ly/paq-cl3x9</text>
  <text x="142" y="262" font-family="Arial, sans-serif" font-size="6" fill="#8E8E93">Codigo seguim: CL890234</text>
</svg>
