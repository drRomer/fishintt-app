<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Background -->
  <rect width="400" height="320" fill="#F5F5F7"/>

  <!-- Phone frame -->
  <rect x="120" y="20" width="160" height="280" rx="24" fill="#1A1A1A"/>
  <rect x="128" y="28" width="144" height="264" rx="18" fill="white"/>

  <!-- Phone notch -->
  <rect x="174" y="32" width="52" height="14" rx="7" fill="#1A1A1A"/>

  <!-- Status bar -->
  <text x="140" y="64" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#1A1A1A">9:41</text>
  <rect x="244" y="58" width="20" height="8" rx="2" fill="#1A1A1A"/>
  <rect x="246" y="60" width="14" height="4" fill="#34C759"/>

  <!-- Messages header -->
  <text x="200" y="84" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">Mensajes</text>
  <line x1="128" y1="92" x2="272" y2="92" stroke="#E5E5EA"/>

  <!-- Sender info -->
  <circle cx="200" cy="108" r="14" fill="#D42B2B"/>
  <text x="200" y="113" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">?</text>
  <text x="200" y="134" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#1A1A1A" text-anchor="middle">+56 2 2580 4471</text>
  <text x="200" y="146" font-family="Arial, sans-serif" font-size="7" fill="#8E8E93" text-anchor="middle">Hoy 10:23</text>

  <!-- Message bubble -->
  <rect x="135" y="155" width="130" height="100" rx="12" fill="#E9E9EB"/>
  <text x="142" y="170" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">BANCO DE CHILE: Hemos</text>
  <text x="142" y="181" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">detectado una transferencia</text>
  <text x="142" y="192" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">de $850.000 desde su</text>
  <text x="142" y="203" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">cuenta. Si no la reconoce</text>
  <text x="142" y="214" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">verifique inmediatamente:</text>
  <text x="142" y="232" font-family="Arial, sans-serif" font-size="7.5" font-weight="600" fill="#0066CC" text-decoration="underline">bch-seguridad.com/v</text>
  <text x="142" y="247" font-family="Arial, sans-serif" font-size="7" fill="#1A1A1A">Codigo: 39281</text>

  <!-- Reply field -->
  <rect x="135" y="270" width="130" height="18" rx="9" fill="#F2F2F7"/>
  <text x="142" y="282" font-family="Arial, sans-serif" font-size="7" fill="#8E8E93">Mensaje</text>
</svg>
