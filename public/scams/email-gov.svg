<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Background -->
  <rect width="400" height="320" fill="#F5F5F7"/>

  <!-- Email window -->
  <rect x="20" y="20" width="360" height="280" rx="12" fill="white" stroke="#E5E5EA"/>

  <!-- Header bar -->
  <rect x="20" y="20" width="360" height="32" rx="12" fill="#F2F2F7"/>
  <rect x="20" y="40" width="360" height="12" fill="#F2F2F7"/>
  <circle cx="35" cy="36" r="4" fill="#FF5F57"/>
  <circle cx="50" cy="36" r="4" fill="#FEBC2E"/>
  <circle cx="65" cy="36" r="4" fill="#28C840"/>

  <!-- From -->
  <text x="34" y="74" font-family="Arial, sans-serif" font-size="9" fill="#8E8E93">De:</text>
  <text x="58" y="74" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#1A1A1A">SII Chile &lt;notificaciones@sii-tramites.org&gt;</text>

  <!-- Subject -->
  <text x="34" y="92" font-family="Arial, sans-serif" font-size="9" fill="#8E8E93">Asunto:</text>
  <text x="71" y="92" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1A1A1A">Tiene una multa tributaria pendiente</text>

  <line x1="20" y1="105" x2="380" y2="105" stroke="#E5E5EA"/>

  <!-- Fake gov banner -->
  <rect x="20" y="115" width="360" height="34" fill="#1A2657"/>
  <text x="200" y="137" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">SERVICIO DE IMPUESTOS INTERNOS</text>

  <!-- Body -->
  <text x="34" y="170" font-family="Arial, sans-serif" font-size="10" fill="#1A1A1A">Estimado contribuyente,</text>

  <text x="34" y="190" font-family="Arial, sans-serif" font-size="9" fill="#1A1A1A">Le informamos que registramos una multa</text>
  <text x="34" y="204" font-family="Arial, sans-serif" font-size="9" fill="#1A1A1A">tributaria por monto de UF 12 pendiente</text>
  <text x="34" y="218" font-family="Arial, sans-serif" font-size="9" fill="#1A1A1A">de pago. Regularize su situacion en 5 dias</text>
  <text x="34" y="232" font-family="Arial, sans-serif" font-size="9" fill="#1A1A1A">corridos o se procedera al cobro forsoso.</text>

  <!-- Suspicious button -->
  <rect x="120" y="246" width="160" height="32" rx="6" fill="#1A2657"/>
  <text x="200" y="266" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">DESCARGAR FORMULARIO</text>

  <text x="34" y="291" font-family="Arial, sans-serif" font-size="7" fill="#8E8E93">sii-tramites.org/formulario_29.exe</text>
</svg>
