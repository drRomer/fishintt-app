<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <rect width="400" height="320" fill="#F5F5F7"/>

  <!-- Email window -->
  <rect x="20" y="20" width="360" height="280" rx="12" fill="white" stroke="#E5E5EA"/>

  <!-- Header bar -->
  <rect x="20" y="20" width="360" height="32" rx="12" fill="#F2F2F7"/>
  <rect x="20" y="40" width="360" height="12" fill="#F2F2F7"/>
  <circle cx="35" cy="36" r="4" fill="#FF5F57"/>
  <circle cx="50" cy="36" r="4" fill="#FEBC2E"/>
  <circle cx="65" cy="36" r="4" fill="#28C840"/>

  <!-- From -->
  <text x="34" y="74" font-family="Arial, sans-serif" font-size="9" fill="#8E8E93">De:</text>
  <text x="58" y="74" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#1A1A1A">Santander Chile &lt;seguridad@santander-cl.com&gt;</text>

  <!-- Subject -->
  <text x="34" y="92" font-family="Arial, sans-serif" font-size="9" fill="#8E8E93">Asunto:</text>
  <text x="71" y="92" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1A1A1A">URGENTE: Verifique su cuenta antes del bloqueo</text>

  <line x1="20" y1="105" x2="380" y2="105" stroke="#E5E5EA"/>

  <!-- Santander red logo -->
  <rect x="34" y="120" width="80" height="22" rx="2" fill="#EC0000"/>
  <text x="74" y="135" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="white" text-anchor="middle">Santander</text>

  <!-- Body -->
  <text x="34" y="162" font-family="Arial, sans-serif" font-size="10" fill="#1A1A1A">Estimado Cliente,</text>

  <text x="34" y="182" font-family="Arial, sans-serif" font-size="9" fill="#1A1A1A">Detectamos un intento de acceso no autorizado a</text>
  <text x="34" y="196" font-family="Arial, sans-serif" font-size="9" fill="#1A1A1A">su cuenta desde una IP desconosida. Por favor</text>
  <text x="34" y="210" font-family="Arial, sans-serif" font-size="9" fill="#1A1A1A">confirme sus credenciales para mantener su cuenta</text>
  <text x="34" y="224" font-family="Arial, sans-serif" font-size="9" fill="#1A1A1A">activa.</text>

  <!-- Suspicious button -->
  <rect x="120" y="238" width="160" height="32" rx="6" fill="#EC0000"/>
  <text x="200" y="258" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">VERIFICAR CUENTA</text>

  <text x="34" y="286" font-family="Arial, sans-serif" font-size="8" fill="#8E8E93">santander-cl.com/secure/login</text>
</svg>
