<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Background -->
  <rect width="400" height="320" fill="#F5F5F7"/>

  <!-- Phone frame -->
  <rect x="120" y="20" width="160" height="280" rx="24" fill="#1A1A1A"/>
  <rect x="128" y="28" width="144" height="264" rx="18" fill="url(#callBg)"/>

  <defs>
    <linearGradient id="callBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>

  <!-- Phone notch -->
  <rect x="174" y="32" width="52" height="14" rx="7" fill="#000"/>

  <!-- "Llamada entrante" label -->
  <text x="200" y="82" font-family="Arial, sans-serif" font-size="9" fill="#8E8E93" text-anchor="middle">Llamada entrante...</text>

  <!-- Caller avatar -->
  <circle cx="200" cy="140" r="38" fill="#3A3A3C"/>
  <text x="200" y="153" font-family="Arial, sans-serif" font-size="36" font-weight="300" fill="#8E8E93" text-anchor="middle">?</text>

  <!-- Pulse rings -->
  <circle cx="200" cy="140" r="46" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <circle cx="200" cy="140" r="54" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>

  <!-- Caller name -->
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Desconocido</text>
  <text x="200" y="216" font-family="Arial, sans-serif" font-size="9" fill="#8E8E93" text-anchor="middle">+56 2 2580 ▒▒▒▒</text>
  <text x="200" y="232" font-family="Arial, sans-serif" font-size="7" fill="#8E8E93" text-anchor="middle">Chile · móvil</text>

  <!-- Decline / Accept buttons -->
  <circle cx="160" cy="270" r="14" fill="#FF3B30"/>
  <path d="M155 270 L165 270" stroke="white" stroke-width="2" stroke-linecap="round" transform="rotate(135 160 270)"/>

  <circle cx="240" cy="270" r="14" fill="#34C759"/>
  <path d="M236 266 Q236 274 244 274" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>

  <text x="160" y="295" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle">Rechazar</text>
  <text x="240" y="295" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle">Aceptar</text>
</svg>
