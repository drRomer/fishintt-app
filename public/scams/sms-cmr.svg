<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <rect width="400" height="320" fill="#F5F5F7"/>

  <!-- Phone frame -->
  <rect x="120" y="20" width="160" height="280" rx="24" fill="#1A1A1A"/>
  <rect x="128" y="28" width="144" height="264" rx="18" fill="white"/>

  <!-- Phone notch -->
  <rect x="174" y="32" width="52" height="14" rx="7" fill="#1A1A1A"/>

  <!-- Status bar -->
  <text x="140" y="64" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#1A1A1A">9:41</text>

  <!-- Header -->
  <text x="200" y="84" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">Mensajes</text>
  <line x1="128" y1="92" x2="272" y2="92" stroke="#E5E5EA"/>

  <!-- Sender -->
  <circle cx="200" cy="108" r="14" fill="#7A2A88"/>
  <text x="200" y="113" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">CMR</text>
  <text x="200" y="134" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#1A1A1A" text-anchor="middle">+56 9 7421 8830</text>
  <text x="200" y="146" font-family="Arial, sans-serif" font-size="7" fill="#8E8E93" text-anchor="middle">Hoy 14:08</text>

  <!-- Message bubble -->
  <rect x="135" y="155" width="130" height="120" rx="12" fill="#F4E6F7"/>
  <text x="142" y="170" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" fill="#7A2A88">CMR Falabella</text>
  <text x="142" y="184" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">Compra detectada de</text>
  <text x="142" y="197" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#D42B2B">$2.890.000</text>
  <text x="142" y="210" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">en MediaMarkt Europa.</text>
  <text x="142" y="226" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">Si no reconoces esta</text>
  <text x="142" y="238" font-family="Arial, sans-serif" font-size="7.5" fill="#1A1A1A">transaccion anula aqui:</text>
  <text x="142" y="256" font-family="Arial, sans-serif" font-size="7.5" font-weight="600" fill="#0066CC" text-decoration="underline">cmr-anular.net/k29</text>
  <text x="142" y="268" font-family="Arial, sans-serif" font-size="6.5" fill="#1A1A1A">Codigo: 73821</text>

  <!-- Reply -->
  <rect x="135" y="282" width="130" height="6" rx="3" fill="#F2F2F7"/>
</svg>
